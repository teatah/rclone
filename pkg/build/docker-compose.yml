version: '3.8'

# docker-compose up
# docker-compose down
# docker rm $(docker ps -a -q) && docker volume prune -f

services:
  postgres:
    image: postgres:latest
    # container_name: pg
    environment:
      POSTGRES_DB: redditclone
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - '5433:5432'
    volumes:
      - './_sql/:/docker-entrypoint-initdb.d/'

  # memcached:
  #   image: 'memcached:latest'
  #   ports:
  #     - '11211:11211'

  # redis:
  #   image: 'redis'
  #   ports:
  #     - '6379:6379'

  # rabbitmq:
  #   image: 'rabbitmq'
  #   ports:
  #     - '5672:5672'

  mongodb:
    image: 'mongo:latest'
    environment:
      - MONGO_INITDB_DATABASE=redditclone
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    ports:
      - '27017-27019:27017-27019'

